<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" id="meta-desc" />
  <title id="page-title">Essay — Valérian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/essay-detail.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"
          integrity="sha384-rRoXxn2yHlrZYB587Ki9RO1tONhLdM6XfORg7Rw4uwH4/Fh/5nP7IUX91bkaKUgs"
          crossorigin="anonymous"></script>
  <script type="application/ld+json" id="schema-json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "",
    "author": { "@type": "Person", "name": "Valérian" },
    "datePublished": "",
    "description": ""
  }
  </script>
</head>
<body>
<div class="progress-bar" id="progress"></div>
<div class="page">

  <nav class="nav" aria-label="primary">
    <a href="index.html" class="nav-logo">VT—</a>
    <div class="nav-links">
      <a href="essays.html" class="nav-link active">Essays</a>
      <a href="books.html" class="nav-link">Books</a>
    </div>
  </nav>

  <main class="main">
    <div class="essay-layout">

      <!-- Sidebar -->
      <aside class="essay-sidebar">
        <a href="essays.html" class="btn-back">← Essays</a>

        <div class="lang-toggle">
          <button class="lang-btn lang-active" id="btn-en">EN</button>
          <span class="lang-sep">/</span>
          <button class="lang-btn" id="btn-fr">FR</button>
        </div>

        <div>
          <div class="essay-sidebar-label">Published</div>
          <time class="essay-sidebar-value" id="sidebar-date">—</time>
        </div>

        <div>
          <div class="essay-sidebar-label">Reading time</div>
          <div class="essay-sidebar-value" id="sidebar-readtime">—</div>
        </div>

        <div>
          <div class="essay-sidebar-label">Tags</div>
          <div id="sidebar-tags" class="sidebar-tags-list"></div>
        </div>

        <div>
          <div class="essay-sidebar-label essay-sidebar-label--toc">Contents</div>
          <nav aria-label="Table of contents" id="toc-nav"></nav>
        </div>
      </aside>

      <!-- Content -->
      <div class="essay-content">

        <header class="essay-header">
          <div class="essay-meta-row">
            <span id="essay-num" class="essay-num-label">Essay №</span>
            <span class="essay-sep"></span>
            <span id="essay-tags-inline" class="essay-tags-inline-label"></span>
          </div>
          <h1 class="essay-title" id="essay-title"></h1>
          <p class="essay-desc" id="essay-desc"></p>
        </header>

        <div class="essay-body" id="essay-body"></div>

        <!-- Next essay -->
        <div id="next-essay-block" class="next-essay-block">
          <a id="next-essay-link" href="#" class="next-essay-link">
            <span class="next-essay-label">Next essay →</span>
            <span id="next-essay-title" class="next-essay-title-text"></span>
          </a>
        </div>

      </div><!-- /essay-content -->
    </div><!-- /essay-layout -->
  </main>

  <footer class="footer">
    <span class="footer-text">Valérian · <span class="footer-accent">Paris</span> · 2026</span>
    <a href="essays.html" class="footer-text">← All essays</a>
  </footer>

</div>
<script src="js/essay-detail.js" defer></script>
</body>
</html>
